    <script>
      // Contacts Modal functionality
      (function() {
        let currentInstanceName = null;
        
        function createModal() {
          const overlay = document.createElement('div');
          overlay.className = 'contacts-modal-overlay';
          overlay.style.display = 'none';
          overlay.innerHTML = \`
            <div class="contacts-modal">
              <div class="contacts-modal-header">
                <h2 class="contacts-modal-title">Contatos - <span id="modal-instance-name"></span></h2>
                <button class="contacts-modal-close" onclick="closeContactsModal()">&times;</button>
              </div>
              <div class="contacts-search-container">
                <input 
                  type="text" 
                  class="contacts-search-input" 
                  placeholder="Buscar contatos..." 
                  id="contacts-search-input"
                  oninput="filterContacts(this.value)"
                />
              </div>
              <div class="contacts-modal-body">
                <ul class="contacts-list" id="contacts-list"></ul>
              </div>
              <div class="contacts-count" id="contacts-count"></div>
            </div>
          \`;
          document.body.appendChild(overlay);
          return overlay;
        }
        
        let modalOverlay = null;
        let allContacts = [];
        
        window.openContactsModal = function(instanceName) {
          if (!modalOverlay) {
            modalOverlay = createModal();
          }
          
          currentInstanceName = instanceName;
          document.getElementById('modal-instance-name').textContent = instanceName;
          modalOverlay.style.display = 'flex';
          
          loadContacts(instanceName);
        };
        
        window.closeContactsModal = function() {
          if (modalOverlay) {
            modalOverlay.style.display = 'none';
          }
        };
        
        window.filterContacts = function(searchTerm) {
          const term = searchTerm.toLowerCase().trim();
          const filtered = allContacts.filter(contact => {
            const name = (contact.pushName || contact.fullName || contact.found || '').toLowerCase();
            const number = (contact.id || '').toLowerCase();
            return name.includes(term) || number.includes(term);
          });
          renderContacts(filtered);
        };
        
        function loadContacts(instanceName) {
          const listElement = document.getElementById('contacts-list');
          const countElement = document.getElementById('contacts-count');
          listElement.innerHTML = '<li class="contacts-loading">Carregando contatos...</li>';
          countElement.textContent = '';
          
          // Get API URL from current page
          const apiUrl = window.location.origin + '/user/contacts';
          
          fetch(apiUrl, {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
              'apikey': localStorage.getItem('apikey') || sessionStorage.getItem('apikey') || ''
            }
          })
          .then(response => {
            if (!response.ok) {
              throw new Error('Erro ao carregar contatos');
            }
            return response.json();
          })
          .then(data => {
            allContacts = data.data || [];
            if (allContacts.length === 0) {
              listElement.innerHTML = '<li class="contacts-empty">Nenhum contato encontrado</li>';
              countElement.textContent = '0 contatos';
            } else {
              renderContacts(allContacts);
              countElement.textContent = allContacts.length + ' contato(s)';
            }
          })
          .catch(error => {
            console.error('Error loading contacts:', error);
            listElement.innerHTML = '<li class="contacts-error">Erro ao carregar contatos: ' + error.message + '</li>';
            countElement.textContent = '';
          });
        }
        
        function renderContacts(contacts) {
          const listElement = document.getElementById('contacts-list');
          
          if (contacts.length === 0) {
            listElement.innerHTML = '<li class="contacts-empty">Nenhum contato encontrado</li>';
            return;
          }
          
          listElement.innerHTML = contacts.map(contact => {
            const displayName = contact.pushName || contact.fullName || contact.found || 'Sem nome';
            const number = contact.id || '';
            const initial = displayName.charAt(0).toUpperCase();
            
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
            return `
              <li class="contact-item" onclick="openChatWithContact(contact, currentInstanceName)" style="cursor: pointer;">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                  <p class="contact-name">${escapeHtml(displayName)}</p>
                  <p class="contact-number">${escapeHtml(number)}</p>
                </div>
              </li>
            `;
        }
        
        function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }
        
        // Close modal on overlay click
        window.addEventListener('click', function(event) {
          if (event.target === modalOverlay) {
            closeContactsModal();
          }
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
          if (event.key === 'Escape' && modalOverlay && modalOverlay.style.display !== 'none') {
            closeContactsModal();
          }
        });
        
        // Add button to instance cards after they are rendered
        function addLoadContactsButton() {
          // Look for connected instance cards
          const cards = document.querySelectorAll('[class*="card"], [class*="instance"]');
          cards.forEach(card => {
            // Check if card is for a connected instance
            const isConnected = card.textContent.includes('connected') || 
                               card.textContent.includes('conectado') ||
                               card.querySelector('[class*="connected"], [class*="success"]');
            
            if (isConnected && !card.querySelector('.load-contacts-btn')) {
              // Find instance name
              const nameElement = card.querySelector('h1, h2, h3, [class*="name"], [class*="title"]');
              const instanceName = nameElement ? nameElement.textContent.trim() : 'Instância';
              
              const btn = document.createElement('button');
              btn.className = 'load-contacts-btn';
              btn.innerHTML = '📋 Carregar Contatos';
              btn.onclick = function(e) {
                e.stopPropagation();
                openContactsModal(instanceName);
              };
              
              card.appendChild(btn);
            }
          });
        }
        
        // Run after initial load and on mutations
        setTimeout(addLoadContactsButton, 1000);
        
        const observer = new MutationObserver(function(mutations) {
          setTimeout(addLoadContactsButton, 500);
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      })();
      
      // Chat Modal functionality
      (function() {
        let currentChatContact = null;
        let currentInstanceName = null;
        let chatMessages = [];
        let messageListeners = [];
        let chatModalOverlay = null;
        let wsConnection = null;
        
        function createChatModal() {
          const overlay = document.createElement('div');
          overlay.className = 'chat-modal-overlay';
          overlay.style.display = 'none';
          overlay.innerHTML = `
            <div class="chat-modal">
              <div class="chat-header">
                <button class="chat-back-btn" onclick="closeChatModal()">←</button>
                <div class="chat-avatar" id="chat-avatar">?</div>
                <div class="chat-contact-info">
                  <p class="chat-contact-name" id="chat-contact-name">-</p>
                  <p class="chat-contact-status" id="chat-contact-status">online</p>
                </div>
                <button class="chat-close-btn" onclick="closeChatModal()">&times;</button>
              </div>
              <div class="chat-messages" id="chat-messages">
                <div class="chat-loading">Carregando mensagens...</div>
              </div>
              <div class="chat-input-container">
                <input 
                  type="text" 
                  class="chat-input" 
                  placeholder="Digite uma mensagem" 
                  id="chat-input"
                  onkeypress="handleChatKeyPress(event)"
                />
                <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()">➤</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          return overlay;
        }
        
        window.openChatModal = function(contact, instanceName) {
          if (!chatModalOverlay) {
            chatModalOverlay = createChatModal();
          }
          
          currentChatContact = contact;
          currentInstanceName = instanceName;
          
          // Update header
          const displayName = contact.pushName || contact.fullName || contact.found || contact.id || 'Desconhecido';
          document.getElementById('chat-contact-name').textContent = displayName;
          const initial = displayName.charAt(0).toUpperCase();
          document.getElementById('chat-avatar').textContent = initial;
          
          chatModalOverlay.style.display = 'flex';
          
          // Load chat history from SQLite via API
          loadChatHistory(contact.id, instanceName);
          
          // Setup WebSocket for real-time messages
          setupWebSocket(instanceName);
        };
        
        window.closeChatModal = function() {
          if (chatModalOverlay) {
            chatModalOverlay.style.display = 'none';
          }
          if (wsConnection) {
            wsConnection.close();
            wsConnection = null;
          }
          // Remove listeners
          messageListeners.forEach(l => {
            try { navigator.serviceWorker.removeEventListener('message', l); } catch(e) {}
          });
          messageListeners = [];
        };
        
        window.handleChatKeyPress = function(event) {
          if (event.key === 'Enter') {
            sendMessage();
          }
        };
        
        function loadChatHistory(contactId, instanceName) {
          const messagesElement = document.getElementById('chat-messages');
          messagesElement.innerHTML = '<div class="chat-loading">Carregando histórico...</div>';
          chatMessages = [];
          
          // Fetch from SQLite via API endpoint
          const apiUrl = window.location.origin + '/user/chat/history?contact=' + encodeURIComponent(contactId) + '&instance=' + encodeURIComponent(instanceName);
          
          fetch(apiUrl, {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
              'apikey': localStorage.getItem('apikey') || sessionStorage.getItem('apikey') || ''
            }
          })
          .then(response => {
            if (!response.ok) {
              throw new Error('Erro ao carregar histórico');
            }
            return response.json();
          })
          .then(data => {
            chatMessages = data.messages || data.data || [];
            renderMessages();
          })
          .catch(error => {
            console.error('Error loading chat history:', error);
            messagesElement.innerHTML = '<div class="no-messages">Histórico não disponível. Inicie uma conversa!</div>';
          });
        }
        
        function renderMessages() {
          const messagesElement = document.getElementById('chat-messages');
          
          if (chatMessages.length === 0) {
            messagesElement.innerHTML = '<div class="no-messages">Nenhuma mensagem ainda. Comece a conversar!</div>';
            return;
          }
          
          messagesElement.innerHTML = chatMessages.map(msg => {
            const time = formatMessageTime(msg.timestamp || msg.createdAt || Date.now());
            const statusIcon = getMessageStatusIcon(msg.status);
            const isSent = msg.fromMe === true || msg.type === 'sent';
            
            return `
              <div class="message ${isSent ? 'sent' : 'received'}" data-message-id="${msg.key?.id || msg.id || ''}">
                <p class="message-content">${escapeHtml(msg.text || msg.body || msg.message || '')}</p>
                <div class="message-meta">
                  <span>${time}</span>
                  ${isSent ? `<span class="message-status ${getStatusClass(msg.status)}">${statusIcon}</span>` : ''}
                </div>
              </div>
            `;
          }).join('');
          
          // Scroll to bottom
          setTimeout(() => {
            messagesElement.scrollTop = messagesElement.scrollHeight;
          }, 100);
        }
        
        function formatMessageTime(timestamp) {
          const date = new Date(timestamp);
          return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getMessageStatusIcon(status) {
          switch(status) {
            case 'read': return '✓✓';
            case 'delivered': return '✓✓';
            case 'sent': return '✓✓';
            case 'pending': return '✓';
            default: return '✓';
          }
        }
        
        function getStatusClass(status) {
          switch(status) {
            case 'read': return 'status-read';
            case 'delivered': return 'status-sent';
            case 'sent': return 'status-sent';
            case 'pending': return 'status-pending';
            default: return 'status-pending';
          }
        }
        
        window.sendMessage = function() {
          const input = document.getElementById('chat-input');
          const sendBtn = document.getElementById('chat-send-btn');
          const text = input.value.trim();
          
          if (!text || !currentChatContact || !currentInstanceName) return;
          
          sendBtn.disabled = true;
          
          // Optimistic update - add message to UI immediately
          const tempId = 'temp_' + Date.now();
          const tempMessage = {
            id: tempId,
            key: { id: tempId },
            text: text,
            body: text,
            message: text,
            fromMe: true,
            status: 'pending',
            timestamp: Date.now(),
            createdAt: Date.now()
          };
          chatMessages.push(tempMessage);
          renderMessages();
          input.value = '';
          
          // Send to API
          const apiUrl = window.location.origin + '/user/sendMessage';
          
          fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': localStorage.getItem('apikey') || sessionStorage.getItem('apikey') || ''
            },
            body: JSON.stringify({
              instance: currentInstanceName,
              number: currentChatContact.id,
              message: text
            })
          })
          .then(response => {
            if (!response.ok) {
              throw new Error('Erro ao enviar mensagem');
            }
            return response.json();
          })
          .then(data => {
            // Update message status to sent
            const msgIndex = chatMessages.findIndex(m => m.id === tempId);
            if (msgIndex !== -1) {
              chatMessages[msgIndex].status = 'sent';
              if (data.messageId) {
                chatMessages[msgIndex].key = { id: data.messageId };
                chatMessages[msgIndex].id = data.messageId;
              }
              renderMessages();
            }
            sendBtn.disabled = false;
          })
          .catch(error => {
            console.error('Error sending message:', error);
            // Update message status to failed
            const msgIndex = chatMessages.findIndex(m => m.id === tempId);
            if (msgIndex !== -1) {
              chatMessages[msgIndex].status = 'failed';
              renderMessages();
            }
            sendBtn.disabled = false;
            alert('Erro ao enviar mensagem: ' + error.message);
          });
        };
        
        function setupWebSocket(instanceName) {
          // Try to connect via WebSocket for real-time updates
          const wsUrl = 'ws://' + window.location.host + '/ws/' + instanceName;
          
          try {
            wsConnection = new WebSocket(wsUrl);
            
            wsConnection.onopen = () => {
              console.log('WebSocket connected for', instanceName);
            };
            
            wsConnection.onmessage = (event) => {
              try {
                const data = JSON.parse(event.data);
                handleIncomingMessage(data);
              } catch(e) {
                console.error('Error parsing WS message:', e);
              }
            };
            
            wsConnection.onerror = (error) => {
              console.error('WebSocket error:', error);
            };
            
            wsConnection.onclose = () => {
              console.log('WebSocket closed');
            };
          } catch(e) {
            console.log('WebSocket not available, using polling');
          }
          
          // Also listen for service worker messages (for push notifications)
          if ('serviceWorker' in navigator) {
            const listener = (event) => {
              if (event.data && event.data.type === 'whatsapp_message') {
                handleIncomingMessage(event.data.payload);
              }
            };
            navigator.serviceWorker.addEventListener('message', listener);
            messageListeners.push(listener);
          }
        }
        
        function handleIncomingMessage(data) {
          // Check if message is for current chat
          const contactId = currentChatContact?.id;
          const messageNumber = data.key?.remoteJid || data.number || data.from || '';
          
          // Normalize numbers for comparison
          const normalizedContact = contactId?.replace(/[^0-9]/g, '');
          const normalizedMessage = messageNumber.replace(/[^0-9]/g, '');
          
          if (normalizedContact && normalizedMessage.includes(normalizedContact)) {
            // Add message to chat
            const newMessage = {
              id: data.key?.id || Date.now().toString(),
              key: data.key || {},
              text: data.message?.conversation || data.message?.extendedTextMessage?.text || data.body || data.message || '',
              body: data.message?.conversation || data.message?.extendedTextMessage?.text || data.body || data.message || '',
              message: data.message?.conversation || data.message?.extendedTextMessage?.text || data.body || data.message || '',
              fromMe: data.key?.fromMe || false,
              status: data.status || (data.key?.fromMe ? 'sent' : 'read'),
              timestamp: data.messageTimestamp || data.timestamp || Date.now(),
              createdAt: data.messageTimestamp || data.timestamp || Date.now()
            };
            
            // Avoid duplicates
            const exists = chatMessages.some(m => m.id === newMessage.id);
            if (!exists) {
              chatMessages.push(newMessage);
              renderMessages();
            } else {
              // Update existing message status
              const existingIndex = chatMessages.findIndex(m => m.id === newMessage.id);
              if (existingIndex !== -1 && newMessage.status) {
                chatMessages[existingIndex].status = newMessage.status;
                renderMessages();
              }
            }
          }
        }
        
        // Close modal on overlay click
        window.addEventListener('click', function(event) {
          if (event.target === chatModalOverlay) {
            closeChatModal();
          }
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
          if (event.key === 'Escape' && chatModalOverlay && chatModalOverlay.style.display !== 'none') {
            closeChatModal();
          }
        });
      })();
    </script>
  </body>
</html>
